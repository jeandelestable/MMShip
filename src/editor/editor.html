<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MMShip label cropper</title>
  <link rel="stylesheet" href="../styles/main.css" />
</head>
<body class="flex flex-col h-screen bg-gray-100 font-sans overflow-hidden">

  <!-- ═══════════════════════════════════════════════ TOOLBAR ══ -->
  <header class="flex items-center gap-3 px-5 py-2.5 bg-white border-b border-gray-200 shadow-sm flex-shrink-0 flex-wrap">

    <!-- Logo MMShip -->
    <img src="../../assets/design/logo-flat.png" alt="MMShip" class="h-7 flex-shrink-0" />

    <!-- Séparateur -->
    <div class="h-6 w-px bg-gray-200 flex-shrink-0"></div>

    <!-- Importer un PDF -->
    <label class="cursor-pointer flex-shrink-0">
      <input type="file" id="pdfInput" accept=".pdf" class="hidden" />
      <span class="inline-flex items-center gap-1.5 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white text-sm font-medium py-1.5 px-4 rounded-md transition-colors select-none">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM6.293 6.707a1 1 0 010-1.414l3-3a1 1 0 011.414 0l3 3a1 1 0 01-1.414 1.414L11 5.414V13a1 1 0 11-2 0V5.414L7.707 6.707a1 1 0 01-1.414 0z" clip-rule="evenodd" />
        </svg>
        Importer un PDF
      </span>
    </label>

    <!-- Séparateur -->
    <div class="h-6 w-px bg-gray-200 flex-shrink-0"></div>

    <!-- Badge transporteur -->
    <div class="flex items-center gap-1.5 text-sm text-gray-600 bg-gray-50 border border-gray-200 rounded-full px-3 py-1 flex-shrink-0">
      <span class="w-2 h-2 rounded-full bg-gray-300" id="carrierDot"></span>
      Transporteur détecté :
      <span id="carrierName" class="font-semibold text-gray-800">Aucun</span>
    </div>

    <!-- Séparateur -->
    <div class="h-6 w-px bg-gray-200 flex-shrink-0"></div>

    <!-- Toggle Recadrage ON / OFF -->
    <div class="flex items-center gap-2 flex-shrink-0">
      <span class="text-sm font-medium text-gray-600">Recadrage</span>
      <label class="relative inline-flex items-center cursor-pointer">
        <input type="checkbox" id="cropToggle" class="sr-only peer" checked />
        <div class="w-10 h-5 bg-gray-300 peer-focus:outline-none rounded-full peer
                    peer-checked:bg-emerald-500
                    after:content-[''] after:absolute after:top-0.5 after:left-0.5
                    after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all
                    peer-checked:after:translate-x-5">
        </div>
      </label>
      <span id="cropToggleLabel" class="text-sm font-semibold text-emerald-600">ON</span>
    </div>

    <!-- Zoom controls (masqués jusqu'au chargement d'un PDF) -->
    <div id="zoomControls" class="hidden items-center gap-2 flex-shrink-0">
      <div class="h-6 w-px bg-gray-200"></div>
      <button id="zoomOut"
        class="inline-flex items-center gap-1 bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-medium py-1.5 px-3 rounded-md transition-colors border border-gray-200">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M5 10a1 1 0 011-1h8a1 1 0 110 2H6a1 1 0 01-1-1z" clip-rule="evenodd" />
        </svg>
        Zoom -
      </button>
      <button id="zoomIn"
        class="inline-flex items-center gap-1 bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-medium py-1.5 px-3 rounded-md transition-colors border border-gray-200">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M10 5a1 1 0 011 1v3h3a1 1 0 110 2h-3v3a1 1 0 11-2 0v-3H6a1 1 0 110-2h3V6a1 1 0 011-1z" clip-rule="evenodd" />
        </svg>
        Zoom +
      </button>
    </div>

    <!-- Espaceur flexible -->
    <div class="flex-1 min-w-0"></div>

    <!-- Bouton Imprimer -->
    <button id="printBtn"
      class="inline-flex items-center gap-1.5 bg-emerald-600 hover:bg-emerald-700 active:bg-emerald-800 text-white text-sm font-medium py-1.5 px-4 rounded-md transition-colors flex-shrink-0">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M5 4v3H4a2 2 0 00-2 2v3a2 2 0 002 2h1v2a1 1 0 001 1h8a1 1 0 001-1v-2h1a2 2 0 002-2V9a2 2 0 00-2-2h-1V4a1 1 0 00-1-1H6a1 1 0 00-1 1zm2 0h6v3H7V4zm-1 9v-1a1 1 0 011-1h6a1 1 0 011 1v1h1a1 1 0 000-2H4a1 1 0 000 2h2zm7 2H7v-2h6v2z" clip-rule="evenodd" />
      </svg>
      Imprimer
    </button>
  </header>

  <!-- ═════════════════════════════════════════════ ZONE PRINCIPALE ══ -->
  <div class="flex flex-1 min-h-0 overflow-hidden">

    <!-- ── Panneau latéral gauche (masqué tant qu'aucun PDF n'est chargé) ── -->
    <aside id="infoPanel" class="hidden w-60 flex-shrink-0 bg-white border-r border-gray-200 overflow-y-auto p-4 flex flex-col gap-5">
      <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Informations</h2>

      <div class="flex flex-col gap-0.5">
        <span class="text-xs text-gray-400">Chargé le</span>
        <span id="infoPdfDate" class="text-sm text-gray-700 font-medium">—</span>
      </div>

      <div class="flex flex-col gap-0.5">
        <span class="text-xs text-gray-400">Fichier</span>
        <span id="infoPdfTitle" class="text-sm text-gray-700 font-medium break-all">—</span>
      </div>

      <div class="flex flex-col gap-0.5">
        <span class="text-xs text-gray-400">Transporteur</span>
        <span id="infoCarrier" class="text-sm text-gray-700 font-medium">—</span>
      </div>

      <div class="flex flex-col gap-0.5">
        <span class="text-xs text-gray-400">Destinataire</span>
        <span id="infoRecipient" class="text-sm text-gray-700 font-medium whitespace-pre-wrap leading-snug">—</span>
      </div>
    </aside>

    <!-- ── Zone PDF ── -->
    <main id="pdfContainer" class="flex-1 min-h-0 overflow-auto p-4 flex flex-col items-center">
      <!-- Placeholder (affiché tant qu'aucun PDF n'est chargé) -->
      <div id="placeholder" class="text-center select-none">
        <svg xmlns="http://www.w3.org/2000/svg" class="mx-auto h-16 w-16 text-gray-300 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
        <p class="text-lg font-light text-gray-400">Aucun PDF chargé</p>
        <p class="text-sm text-gray-300 mt-1">Importez un fichier via le bouton ci-dessus</p>
      </div>

      <!-- Visionneuse PDF (cachée jusqu'au chargement d'un PDF) -->
      <div id="pdfViewer" class="hidden flex flex-col items-center gap-2">
        <div class="relative inline-block shadow-lg">
          <canvas id="pdfCanvas"></canvas>
          <!-- Overlay transparent pour le dessin du recadrage -->
          <canvas id="cropOverlay" class="absolute top-0 left-0" style="pointer-events: none;"></canvas>
        </div>
        <!-- Indicateur de coordonnées (visible quand une zone est sélectionnée) -->
        <div id="coordsDisplay" class="hidden text-xs text-gray-500 bg-white border border-gray-200 rounded px-3 py-1.5 font-mono shadow-sm">
          Zone de recadrage — <span id="coordsText"></span>
        </div>
      </div>
    </main>

  </div>

  <!-- Éléments d'impression (invisibles à l'écran) -->
  <iframe id="printFrame" style="display:none !important; position:absolute; width:0; height:0; border:none;"></iframe>
  <canvas id="printCanvas" style="display:none;"></canvas>

  <style>
    @media print {
      @page { margin: 0; }
      body > * { display: none !important; }
      #printCanvas {
        display: block !important;
        width: 100% !important;
        height: auto !important;
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
      }
    }
  </style>

  <script type="module" src="./editor.js"></script>
</body>
</html>
